<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#161620"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </radialGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#f97316" stroke-width="0.6" opacity="0.1"/>
    </pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#scanlines)"/>

  <!-- Decorative circles -->
  <circle cx="800" cy="450" r="300" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.18"/>
  <circle cx="800" cy="450" r="350" fill="none" stroke="#f97316" stroke-width="1" opacity="0.1" stroke-dasharray="12 16"/>
  <circle cx="800" cy="450" r="220" fill="none" stroke="#f97316" stroke-width="1" opacity="0.12" stroke-dasharray="6 10"/>

  <!-- Corner brackets -->
  <g stroke="#f97316" stroke-width="3" opacity="0.5">
    <!-- Top left -->
    <line x1="60" y1="60" x2="60" y2="150"/>
    <line x1="60" y1="60" x2="150" y2="60"/>
    <!-- Top right -->
    <line x1="1540" y1="60" x2="1540" y2="150"/>
    <line x1="1540" y1="60" x2="1450" y2="60"/>
    <!-- Bottom left -->
    <line x1="60" y1="840" x2="60" y2="750"/>
    <line x1="60" y1="840" x2="150" y2="840"/>
    <!-- Bottom right -->
    <line x1="1540" y1="840" x2="1540" y2="750"/>
    <line x1="1540" y1="840" x2="1450" y2="840"/>
  </g>

  <!-- Crosshair -->
  <g stroke="#f97316" opacity="0.25" stroke-width="1">
    <line x1="550" y1="450" x2="1050" y2="450"/>
    <line x1="800" y1="280" x2="800" y2="620"/>
  </g>
  <!-- Crosshair tick marks -->
  <g stroke="#f97316" opacity="0.3" stroke-width="1.5">
    <line x1="780" y1="300" x2="820" y2="300"/>
    <line x1="780" y1="600" x2="820" y2="600"/>
    <line x1="570" y1="430" x2="570" y2="470"/>
    <line x1="1030" y1="430" x2="1030" y2="470"/>
  </g>

  <!-- Top classification bar -->
  <rect x="500" y="160" width="600" height="50" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1.5"/>
  <text x="800" y="194" text-anchor="middle" font-family="monospace" font-size="24" fill="#f97316" letter-spacing="10" opacity="0.8">TOP SECRET</text>

  <!-- Main title -->
  <text x="800" y="430" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="90" fill="#f97316" filter="url(#glow)" letter-spacing="6">[ CLASSIFIED ]</text>

  <!-- Subtitle -->
  <text x="800" y="500" text-anchor="middle" font-family="monospace" font-size="28" fill="#fafafa" opacity="0.55" letter-spacing="8">AUTHORIZED PERSONNEL ONLY</text>

  <!-- Clearance level -->
  <text x="800" y="560" text-anchor="middle" font-family="monospace" font-size="20" fill="#f97316" opacity="0.4" letter-spacing="4">CLEARANCE LEVEL: CURIOUS</text>

  <!-- Bottom decorative text -->
  <text x="800" y="770" text-anchor="middle" font-family="monospace" font-size="16" fill="#f97316" opacity="0.25" letter-spacing="3">PROJECT BACKLOG // EYES ONLY // DO NOT DISTRIBUTE</text>

  <!-- Decorative dots -->
  <circle cx="630" cy="340" r="5" fill="#f97316" opacity="0.35"/>
  <circle cx="970" cy="340" r="5" fill="#f97316" opacity="0.35"/>
  <circle cx="630" cy="580" r="5" fill="#f97316" opacity="0.35"/>
  <circle cx="970" cy="580" r="5" fill="#f97316" opacity="0.35"/>
</svg>