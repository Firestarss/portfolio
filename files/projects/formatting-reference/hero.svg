<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#1a1a26"/>
      <stop offset="30%" style="stop-color:#141420"/>
      <stop offset="60%" style="stop-color:#0f0f18"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Code brackets decoration -->
  <text x="200" y="480" font-family="monospace" font-size="300" fill="#f97316" opacity="0.08">{</text>
  <text x="1250" y="480" font-family="monospace" font-size="300" fill="#f97316" opacity="0.08">}</text>

  <!-- Document icon -->
  <g transform="translate(700, 180)" opacity="0.5">
    <rect x="0" y="0" width="200" height="250" rx="12" fill="none" stroke="#f97316" stroke-width="3"/>
    <rect x="0" y="0" width="200" height="60" rx="12" fill="#f97316" opacity="0.15"/>
    <line x1="40" y1="100" x2="160" y2="100" stroke="#f97316" stroke-width="3" opacity="0.4"/>
    <line x1="40" y1="130" x2="140" y2="130" stroke="#f97316" stroke-width="3" opacity="0.3"/>
    <line x1="40" y1="160" x2="155" y2="160" stroke="#f97316" stroke-width="3" opacity="0.4"/>
    <line x1="40" y1="190" x2="120" y2="190" stroke="#f97316" stroke-width="3" opacity="0.3"/>
    <!-- Folded corner -->
    <path d="M150 0 L200 50 L150 50 Z" fill="#f97316" opacity="0.1"/>
  </g>

  <!-- Title -->
  <text x="800" y="560" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="80" fill="#f97316" filter="url(#glow)" letter-spacing="4">FORMATTING</text>
  <text x="800" y="650" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="80" fill="#f97316" filter="url(#glow)" letter-spacing="4">REFERENCE</text>

  <!-- Subtitle -->
  <text x="800" y="720" text-anchor="middle" font-family="monospace" font-size="28" fill="#fafafa" opacity="0.45" letter-spacing="6">PROJECT PAGE CHEAT SHEET</text>

  <!-- Decorative elements -->
  <text x="800" y="810" text-anchor="middle" font-family="monospace" font-size="18" fill="#f97316" opacity="0.25" letter-spacing="3">MARKDOWN // HTML // CSS LAYOUTS // GALLERY // FILES // VIDEO</text>
</svg>