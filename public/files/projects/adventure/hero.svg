<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" style="stop-color:#1a1a26"/>
      <stop offset="30%" style="stop-color:#141420"/>
      <stop offset="60%" style="stop-color:#0f0f18"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </radialGradient>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <!-- Decorative circles -->
  <circle cx="800" cy="450" r="320" fill="none" stroke="#f97316" stroke-width="3" opacity="0.2"/>
  <circle cx="800" cy="450" r="380" fill="none" stroke="#f97316" stroke-width="2" opacity="0.12" stroke-dasharray="16 20"/>
  <circle cx="800" cy="450" r="240" fill="none" stroke="#f97316" stroke-width="2" opacity="0.14" stroke-dasharray="8 14"/>

  <!-- Corner brackets -->
  <g stroke="#f97316" stroke-width="5" opacity="0.55">
    <!-- Top left -->
    <line x1="50" y1="50" x2="50" y2="170"/>
    <line x1="50" y1="50" x2="170" y2="50"/>
    <!-- Top right -->
    <line x1="1550" y1="50" x2="1550" y2="170"/>
    <line x1="1550" y1="50" x2="1430" y2="50"/>
    <!-- Bottom left -->
    <line x1="50" y1="850" x2="50" y2="730"/>
    <line x1="50" y1="850" x2="170" y2="850"/>
    <!-- Bottom right -->
    <line x1="1550" y1="850" x2="1550" y2="730"/>
    <line x1="1550" y1="850" x2="1430" y2="850"/>
  </g>

  <!-- Crosshair -->
  <g stroke="#f97316" opacity="0.25" stroke-width="1.5">
    <line x1="500" y1="450" x2="1100" y2="450"/>
    <line x1="800" y1="250" x2="800" y2="650"/>
  </g>
  <!-- Crosshair tick marks -->
  <g stroke="#f97316" opacity="0.35" stroke-width="2.5">
    <line x1="775" y1="280" x2="825" y2="280"/>
    <line x1="775" y1="620" x2="825" y2="620"/>
    <line x1="530" y1="425" x2="530" y2="475"/>
    <line x1="1070" y1="425" x2="1070" y2="475"/>
  </g>

  <!-- Top classification bar -->
  <rect x="440" y="120" width="720" height="65" rx="6" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="2"/>
  <text x="800" y="164" text-anchor="middle" font-family="monospace" font-size="40" fill="#f97316" letter-spacing="14" opacity="0.85">TOP SECRET</text>

  <!-- Main title -->
  <text x="800" y="445" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="130" fill="#f97316" filter="url(#glow)" letter-spacing="8">[ CLASSIFIED ]</text>

  <!-- Subtitle -->
  <text x="800" y="530" text-anchor="middle" font-family="monospace" font-size="42" fill="#fafafa" opacity="0.55" letter-spacing="10">AUTHORIZED PERSONNEL ONLY</text>

  <!-- Clearance level -->
  <text x="800" y="600" text-anchor="middle" font-family="monospace" font-size="32" fill="#f97316" opacity="0.45" letter-spacing="6">CLEARANCE LEVEL: CURIOUS</text>

  <!-- Bottom decorative text -->
  <text x="800" y="790" text-anchor="middle" font-family="monospace" font-size="26" fill="#f97316" opacity="0.3" letter-spacing="4">PROJECT BACKLOG // EYES ONLY // DO NOT DISTRIBUTE</text>

  <!-- Decorative dots -->
  <circle cx="590" cy="310" r="6" fill="#f97316" opacity="0.4"/>
  <circle cx="1010" cy="310" r="6" fill="#f97316" opacity="0.4"/>
  <circle cx="590" cy="620" r="6" fill="#f97316" opacity="0.4"/>
  <circle cx="1010" cy="620" r="6" fill="#f97316" opacity="0.4"/>
</svg>